# LLM judge configuration (hot-reloadable — changes take effect without restart).
#
# Copy to judge.toml and edit.  Environment variables override file values.
#
# Env var mapping:
#   LLM_JUDGE_API_BASE, LLM_JUDGE_API_KEY, LLM_JUDGE_MODELS (comma-separated),
#   LLM_JUDGE_BATCH_SIZE, LLM_JUDGE_CONCURRENCY, LLM_JUDGE_TIMEOUT,
#   LLM_JUDGE_MAX_RETRIES, LLM_JUDGE_PRICING (model:in:out,...)
#
# Config file path can be changed via LLM_JUDGE_CONFIG env var (default: judge.toml).

api_base = "http://localhost:8317/v1/chat/completions"
# api_key = ""   # Prefer LLM_JUDGE_API_KEY env var.

models = ["gpt-mini", "spark", "gemini-flash"]

batch_size  = 10    # Items per API call.
concurrency = 6     # Parallel batch workers.
timeout     = 90    # Seconds per HTTP request.
max_retries = 3     # Retries per model before fallback.

[pricing]   # USD per 1M tokens: [input, output].
gpt-mini      = [0.15, 0.60]
spark         = [0.50, 2.00]
gemini-flash  = [0.15, 0.60]

# Custom system prompt for refusal classification.
# The built-in default is designed for Chinese political censorship detection.
# Override for other domains (NSFW, religious, etc.) or languages.
# Env var: LLM_JUDGE_SYSTEM_PROMPT (overrides this file).
#
# IMPORTANT: Custom prompts should include instructions for the judge to
# ignore manipulation attempts within the classified text. The built-in
# default contains such safeguards; omitting them from a custom prompt
# may increase the success rate of prompt injection from model output.
# system_prompt = """Your custom classification prompt..."""

# Alternative: load system prompt from an external file.
# The file is re-read on each config reload (hot-reloadable).
# When both system_prompt and system_prompt_file are set, system_prompt wins.
# system_prompt_file = "judge_prompt.txt"
